<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Nhận Diện - Nhóm 7</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container glass-panel">
        <header>
            <h1>Hệ Thống Nhận Diện Biển Báo Giao Thông</h1>
            <h2 class="subtitle">Nhóm 7 - Trí Tuệ Nhân Tạo</h2>
        </header>

        <main>
            <div class="result-header">
                <h3>Kết quả phân tích hình ảnh</h3>
                <div class="audio-player">
                    <span>🔊 </span> 
                    <audio controls autoplay>
                        <source src="{{ url_for('static', filename='voice.mp3') }}" type="audio/mpeg">
                        Trình duyệt không hỗ trợ phát âm thanh.
                    </audio>
                </div>
            </div>

            <!-- Khung hiển thị ảnh kết quả -->
            <div class="image-showcase">
                <img src="{{ url_for('static', filename='result.jpg') }}" alt="Ảnh sau khi AI xử lý" class="result-img">
            </div>

            <!-- Các hành động tiếp theo -->
            <div class="actions-section">
                <a href="/" class="btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Tải ảnh khác
                </a>
                <a href="{{ url_for('static', filename='result.jpg') }}" download="yolov8_result.jpg" class="btn-submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Tải ảnh kết quả
                </a>
            </div>
            
        </main>
    </div>
</body>
</html>
